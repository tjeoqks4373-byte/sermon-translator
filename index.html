<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Korean → Chinese Live Translator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  .app-container {
    flex-direction: column;
    height: 100vh;
    height: 100dvh; /* dynamic viewport height - accounts for mobile browser bars */
  }
  body {
    font-family: -apple-system, 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    flex-direction: column;
  }
  .header {
    padding: 12px 16px;
    background: #16213e;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #333;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header h1 { font-size: 16px; font-weight: 600; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-play { background: #4ecca3; color: white; }
  .btn-play:hover { background: #3dbb92; }
  .btn-play.active { animation: pulse 1.5s infinite; }
  .btn-pause { background: #f0a500; color: white; }
  .btn-pause:hover { background: #d99400; }
  .btn-stop { background: #e94560; color: white; }
  .btn-stop:hover { background: #c73e54; }
  .btn-clear { background: #333; color: #ccc; }
  .btn-clear:hover { background: #444; }
  .btn-edit { background: #e94560; color: white; font-size: 13px; padding: 6px 14px; }
  .btn-edit:hover { background: #c73e54; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(78, 204, 163, 0.4); }
    50% { box-shadow: 0 0 0 12px rgba(78, 204, 163, 0); }
  }
  .status { font-size: 13px; color: #888; }
  .status.active { color: #4ecca3; }
  .status.editing { color: #e94560; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chinese-area {
    flex: 1; padding: 24px; overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .chinese-area > .chinese-text { margin-top: auto; }
  .chinese-area.editing-mode { border: 2px solid #e94560; }
  .chinese-text {
    font-size: 28px; line-height: 1.6; color: #fff;
    word-break: break-word; outline: none; min-height: 50px;
  }
  .chinese-text:focus { border-left: 3px solid #4ecca3; padding-left: 12px; }
  .chinese-text .interim { color: #888; }
  .korean-area {
    padding: 12px 24px; background: #16213e;
    border-top: 1px solid #333; max-height: 30vh; overflow-y: auto;
  }
  .korean-text {
    font-size: 18px; line-height: 1.8; color: #aaa;
    word-break: break-word; outline: none; min-height: 30px;
  }
  .korean-text:focus { border-left: 3px solid #f0a500; padding-left: 12px; }
  .korean-text .interim { color: #666; }
  .font-controls { display: flex; gap: 6px; align-items: center; }
  .font-btn {
    background: #333; color: #ccc; border: none; border-radius: 4px;
    width: 28px; height: 28px; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .font-btn:hover { background: #444; }
  .font-size-label { font-size: 12px; color: #888; min-width: 32px; text-align: center; }

  /* Edit banner - just above korean typing bar */
  .edit-banner {
    display: none;
    background: #e94560;
    color: white;
    padding: 12px 16px;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .edit-banner.visible { display: block; }

  /* Mode selector */
  .mode-select {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a2e; display: flex; align-items: center;
    justify-content: center; z-index: 1000;
  }
  .mode-box {
    text-align: center; max-width: 500px; padding: 32px;
  }
  .mode-box h2 { font-size: 28px; margin-bottom: 12px; }
  .mode-box p { font-size: 16px; color: #aaa; margin-bottom: 40px; }
  .mode-buttons { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
  .mode-btn {
    background: #16213e; border: 2px solid #333; border-radius: 16px;
    padding: 32px 40px; cursor: pointer; transition: all 0.2s;
    text-align: center; min-width: 200px;
  }
  .mode-btn:hover { border-color: #4ecca3; }
  .mode-btn h3 { font-size: 20px; color: #fff; margin-bottom: 8px; }
  .mode-btn p { font-size: 14px; color: #888; margin: 0; }

  /* Viewer mode */
  .viewer-header {
    padding: 12px 24px;
    background: #16213e;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .viewer-header h1 { font-size: 16px; }
  .sync-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #e94560; display: inline-block; margin-right: 8px;
  }
  .sync-dot.connected { background: #4ecca3; animation: pulse-dot 2s infinite; }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>

<!-- Mode selector -->
<div class="mode-select" id="modeSelect">
  <div class="mode-box">
    <h2>Sermon Translator</h2>
    <p>Korean → Chinese (Simplified)</p>
    <div class="mode-buttons">
      <div class="mode-btn" onclick="initController()">
        <h3>Controller</h3>
        <p>Mic + Edit + Translate<br>(Your phone)</p>
      </div>
      <div class="mode-btn" onclick="initViewer()">
        <h3>Viewer</h3>
        <p>Display only<br>(Customer iPad)</p>
      </div>
    </div>
  </div>
</div>

<!-- Controller mode -->
<div id="controllerUI" class="app-container" style="display:none;">
  <div class="header">
    <h1>Controller</h1>
    <div class="controls">
      <span class="status" id="status">Ready</span>
      <div class="font-controls">
        <button class="font-btn" onclick="changeFontSize(-4)">-</button>
        <span class="font-size-label" id="fontLabel">28px</span>
        <button class="font-btn" onclick="changeFontSize(4)">+</button>
      </div>
      <span class="status" id="viewerCount" title="viewers">Viewers 0</span>
      <button class="btn btn-clear" onclick="showQR()">QR</button>
      <button class="btn btn-clear" onclick="saveSession()">Save</button>
      <button class="btn btn-clear" onclick="clearAll()">Clear</button>
      <button class="btn btn-play" id="playBtn" onclick="startListening()">Play</button>
      <button class="btn btn-pause" id="pauseBtn" onclick="pauseListening()" disabled>Pause</button>
      <button class="btn btn-stop" id="stopBtn" onclick="stopListening()" disabled>Stop</button>
    </div>
  </div>
  <div id="qrOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:2000; align-items:center; justify-content:center; flex-direction:column; gap:16px;" onclick="this.style.display='none'">
    <div style="background:#fff; padding:20px; border-radius:16px;">
      <img id="qrImg" width="280" height="280" alt="QR">
    </div>
    <p style="color:#fff; font-size:14px; text-align:center; padding:0 24px; word-break:break-all;" id="qrUrl"></p>
    <p style="color:#888; font-size:13px;">Tap anywhere to close</p>
  </div>
  <div class="main">
    <div class="chinese-area" id="chineseArea">
      <div class="chinese-text" id="chineseText" contenteditable="true"></div>
    </div>
    <div class="edit-banner" id="editBanner" onclick="exitEditMode()">EDITING MODE - Tap here to resume live</div>
    <div class="korean-area">
      <div class="korean-text" id="koreanText" contenteditable="true"></div>
    </div>
  </div>
</div>

<!-- Viewer mode -->
<div id="viewerUI" class="app-container" style="display:none;">
  <div class="viewer-header">
    <h1><span class="sync-dot" id="syncDot"></span> Live Translation</h1>
    <div class="font-controls">
      <button class="font-btn" onclick="changeFontSizeViewer(-4)">-</button>
      <span class="font-size-label" id="fontLabelViewer">28px</span>
      <button class="font-btn" onclick="changeFontSizeViewer(4)">+</button>
    </div>
  </div>
  <div class="main">
    <div class="chinese-area">
      <div class="chinese-text" id="viewerChinese" style="cursor:default;"></div>
    </div>
  </div>
</div>

<script>
  const BASE_URL = 'https://regtorg-webhook-production.up.railway.app';
  const SYNC_URL = BASE_URL + '/sermon/sync';
  const API_URL = BASE_URL + '/sermon/translate';

  // ─── MODE SELECTION ───
  function initController() {
    document.getElementById('modeSelect').style.display = 'none';
    document.getElementById('controllerUI').style.display = 'flex';
    setupController();
  }

  function initViewer() {
    document.getElementById('modeSelect').style.display = 'none';
    document.getElementById('viewerUI').style.display = 'flex';
    setupViewer();
  }

  // ─── CONTROLLER MODE ───
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  let recState = 'stopped';
  let finalKorean = '';
  let finalChinese = '';
  let interimChinese = '';
  let fontSize = 28;
  let recognition = null;
  let isEditing = false;
  let pendingQueue = []; // queue translations while editing

  function setupController() {
    if (!SpeechRecognition) {
      alert('This browser does not support Speech Recognition. Please use Chrome.');
    }
    // restore from localStorage after refresh
    try {
      const savedKo = localStorage.getItem('sermon_ko') || '';
      const savedZh = localStorage.getItem('sermon_zh') || '';
      if (savedKo || savedZh) {
        finalKorean = savedKo;
        finalChinese = savedZh;
        document.getElementById('koreanText').innerText = finalKorean;
        document.getElementById('chineseText').innerText = finalChinese;
        setTimeout(scrollToBottom, 100);
      }
    } catch (e) {}
  }

  function persistLocal() {
    try {
      localStorage.setItem('sermon_ko', finalKorean);
      localStorage.setItem('sermon_zh', finalChinese);
    } catch (e) {}
  }

  function showQR() {
    const url = location.href.split('#')[0];
    document.getElementById('qrImg').src =
      'https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=' + encodeURIComponent(url);
    document.getElementById('qrUrl').textContent = url;
    document.getElementById('qrOverlay').style.display = 'flex';
  }

  function saveSession() {
    if (!finalKorean.trim() && !finalChinese.trim()) { alert('Nothing to save.'); return; }
    fetch(BASE_URL + '/sermon/session/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ korean: finalKorean, chinese: finalChinese })
    })
    .then(r => r.json())
    .then(d => alert(d.ok ? 'Saved. View at /sermon/history' : 'Save failed: ' + (d.error || '')))
    .catch(() => alert('Save failed: network error'));
  }

  function enterEditMode() {
    if (isEditing) return;
    isEditing = true;
    document.getElementById('editBanner').classList.add('visible');
    document.getElementById('chineseArea').classList.add('editing-mode');
    const statusEl = document.getElementById('status');
    statusEl.textContent = 'Editing';
    statusEl.classList.add('editing');
  }

  function exitEditMode() {
    isEditing = false;
    document.getElementById('editBanner').classList.remove('visible');
    document.getElementById('chineseArea').classList.remove('editing-mode');
    // apply queued translations
    const ct = document.getElementById('chineseText');
    finalChinese = ct.innerText;
    if (pendingQueue.length > 0) {
      finalChinese += pendingQueue.join('');
      pendingQueue = [];
      ct.innerText = finalChinese;
    }
    syncToServer();
    scrollToBottom();
    updateButtons();
  }

  function syncToServer() {
    persistLocal();
    fetch(SYNC_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        korean: finalKorean,
        chinese: finalChinese,
        interimChinese: interimChinese,
        ts: Date.now()
      })
    })
    .then(r => r.json())
    .then(d => {
      if (d && typeof d.viewers === 'number') {
        document.getElementById('viewerCount').textContent = 'Viewers ' + d.viewers;
      }
    })
    .catch(() => {});
  }

  function createRecognition() {
    const r = new SpeechRecognition();
    r.lang = 'ko-KR';
    r.continuous = true;
    r.interimResults = true;
    r.maxAlternatives = 1;

    r.onstart = () => { recState = 'listening'; updateButtons(); };

    r.onend = () => {
      if (recState === 'listening') {
        try { recognition = createRecognition(); recognition.start(); } catch(e) {}
        return;
      }
      updateButtons();
    };

    r.onerror = (e) => {
      if (e.error === 'no-speech' || e.error === 'aborted') return;
      console.error('Speech error:', e.error);
    };

    r.onresult = (event) => {
      let interimTranscript = '';
      let newFinal = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) newFinal += transcript;
        else interimTranscript += transcript;
      }
      if (newFinal) {
        const ctx = finalKorean.slice(-200);
        finalKorean += newFinal;
        enqueueFinal(newFinal, ctx);
      }
      const kt = document.getElementById('koreanText');
      if (!isEditing) {
        kt.innerHTML = finalKorean +
          (interimTranscript ? '<span class="interim">' + interimTranscript + '</span>' : '');
      }
      if (interimTranscript) debounceTranslateInterim(interimTranscript);
      if (!isEditing) scrollToBottom();
    };

    return r;
  }

  function updateButtons() {
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');
    if (isEditing) {
      statusEl.textContent = 'Editing';
      statusEl.classList.remove('active');
      statusEl.classList.add('editing');
      return;
    }
    statusEl.classList.remove('editing');
    if (recState === 'stopped') {
      playBtn.disabled = false; pauseBtn.disabled = true; stopBtn.disabled = true;
      playBtn.classList.remove('active');
      statusEl.textContent = 'Ready'; statusEl.classList.remove('active');
    } else if (recState === 'listening') {
      playBtn.disabled = true; pauseBtn.disabled = false; stopBtn.disabled = false;
      playBtn.classList.add('active');
      statusEl.textContent = 'Listening'; statusEl.classList.add('active');
    } else if (recState === 'paused') {
      playBtn.disabled = false; pauseBtn.disabled = true; stopBtn.disabled = false;
      playBtn.classList.remove('active');
      statusEl.textContent = 'Paused'; statusEl.classList.remove('active');
    }
  }

  function startListening() {
    recState = 'listening'; updateButtons();
    recognition = createRecognition();
    try { recognition.start(); } catch(e) {}
  }
  function pauseListening() {
    recState = 'paused'; updateButtons();
    if (recognition) recognition.stop();
  }
  function stopListening() {
    recState = 'stopped'; updateButtons();
    if (recognition) recognition.stop();
  }

  let interimTimer = null;
  function debounceTranslateInterim(text) {
    clearTimeout(interimTimer);
    interimTimer = setTimeout(() => translateInterim(text), 300);
  }

  // ─── Final translation: sequential queue with retry ───
  // Guarantees order and prevents lost sentences on API failure.
  const finalQueue = [];
  let processingFinal = false;

  function enqueueFinal(text, ctx) {
    if (!text.trim()) return;
    finalQueue.push({ text: text, ctx: ctx || '', tries: 0 });
    processFinalQueue();
  }

  async function processFinalQueue() {
    if (processingFinal) return;
    processingFinal = true;
    while (finalQueue.length > 0) {
      const item = finalQueue[0];
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: item.text, context: item.ctx })
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'translate failed');
        applyFinalTranslation(data.translated);
        finalQueue.shift();
      } catch (err) {
        item.tries++;
        if (item.tries >= 5) {
          console.error('Translation gave up after 5 tries:', item.text);
          finalQueue.shift();
        } else {
          await new Promise(r => setTimeout(r, 2000));
        }
      }
    }
    processingFinal = false;
  }

  function applyFinalTranslation(translated) {
    if (isEditing) {
      pendingQueue.push(translated);
      interimChinese = '';
    } else {
      finalChinese += translated;
      interimChinese = '';
      document.getElementById('chineseText').innerHTML = finalChinese;
    }
    syncToServer();
    if (!isEditing) scrollToBottom();
  }

  // ─── Interim translation: best-effort, no retry ───
  async function translateInterim(text) {
    if (!text.trim()) return;
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, context: finalKorean.slice(-200) })
      });
      const data = await res.json();
      if (data.ok) {
        interimChinese = data.translated;
        if (!isEditing) {
          document.getElementById('chineseText').innerHTML =
            finalChinese + '<span class="interim">' + data.translated + '</span>';
          scrollToBottom();
        }
        syncToServer();
      }
    } catch (err) { console.error('Interim translation error:', err); }
  }

  function scrollToBottom() {
    const ca = document.getElementById('chineseArea');
    if (ca) ca.scrollTop = ca.scrollHeight;
    const ka = document.querySelector('.korean-area');
    if (ka) ka.scrollTop = ka.scrollHeight;
  }

  function clearAll() {
    if (!confirm('Clear all text?')) return;
    finalKorean = ''; finalChinese = ''; interimChinese = '';
    pendingQueue = [];
    finalQueue.length = 0;
    document.getElementById('koreanText').innerHTML = '';
    document.getElementById('chineseText').innerHTML = '';
    try { localStorage.removeItem('sermon_ko'); localStorage.removeItem('sermon_zh'); } catch (e) {}
    syncToServer();
  }

  function changeFontSize(delta) {
    fontSize = Math.max(20, Math.min(80, fontSize + delta));
    document.getElementById('chineseText').style.fontSize = fontSize + 'px';
    document.getElementById('fontLabel').textContent = fontSize + 'px';
  }

  // Chinese text focus → enter edit mode
  // Chinese text blur → exit edit mode
  document.addEventListener('DOMContentLoaded', () => {
    const ct = document.getElementById('chineseText');
    const kt = document.getElementById('koreanText');

    // Enter key = finish editing and resume live (Shift+Enter for newline)
    function enterKeyExits(el) {
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          el.blur();
          exitEditMode();
        }
      });
    }

    if (ct) {
      enterKeyExits(ct);
      ct.addEventListener('focus', () => enterEditMode());
      ct.addEventListener('input', () => {
        finalChinese = ct.innerText;
        syncToServer();
      });
    }

    if (kt) {
      let koreanEditTimer = null;
      enterKeyExits(kt);
      kt.addEventListener('focus', () => enterEditMode());
      kt.addEventListener('input', () => {
        finalKorean = kt.innerText;
        clearTimeout(koreanEditTimer);
        koreanEditTimer = setTimeout(async () => {
          const text = kt.innerText.trim();
          if (!text) return;
          try {
            const res = await fetch(API_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: text })
            });
            const data = await res.json();
            if (data.ok) {
              finalChinese = data.translated;
              ct.innerText = finalChinese;
              syncToServer();
            }
          } catch (err) { console.error('Re-translation error:', err); }
        }, 800);
      });
    }
  });

  // ─── VIEWER MODE ───
  let viewerFontSize = 28;
  let lastTs = 0;
  let viewerAutoScroll = true;
  let viewerScrollTimer = null;
  let viewerDisplayedText = '';
  let typewriterTimer = null;
  let typewriterTarget = '';
  let typewriterInterim = '';

  function setupViewer() {
    document.getElementById('syncDot').classList.add('connected');
    setInterval(fetchSync, 500);

    const viewerArea = document.getElementById('viewerChinese').parentElement;
    viewerArea.addEventListener('scroll', () => {
      const atBottom = viewerArea.scrollTop + viewerArea.clientHeight >= viewerArea.scrollHeight - 30;
      if (atBottom) {
        viewerAutoScroll = true;
      } else {
        viewerAutoScroll = false;
        clearTimeout(viewerScrollTimer);
        viewerScrollTimer = setTimeout(() => { viewerAutoScroll = true; viewerScrollToBottom(); }, 5000);
      }
    });
  }

  function viewerScrollToBottom() {
    const viewerArea = document.getElementById('viewerChinese').parentElement;
    if (viewerArea) viewerArea.scrollTop = viewerArea.scrollHeight;
  }

  function startTypewriter(fullText, interim) {
    typewriterTarget = fullText;
    typewriterInterim = interim;
    // if the confirmed text diverges from what we already displayed,
    // roll back to the common prefix so the correction is applied
    if (!typewriterTarget.startsWith(viewerDisplayedText)) {
      let common = 0;
      const max = Math.min(viewerDisplayedText.length, typewriterTarget.length);
      while (common < max && viewerDisplayedText[common] === typewriterTarget[common]) common++;
      viewerDisplayedText = typewriterTarget.substring(0, common);
    }
    if (typewriterTimer) return;
    runTypewriter();
  }

  function runTypewriter() {
    const el = document.getElementById('viewerChinese');
    if (viewerDisplayedText.length < typewriterTarget.length) {
      viewerDisplayedText = typewriterTarget.substring(0, viewerDisplayedText.length + 1);
      const remaining = typewriterTarget.substring(viewerDisplayedText.length);
      el.innerHTML = viewerDisplayedText +
        (remaining ? '<span class="interim">' + remaining + '</span>' : '') +
        (typewriterInterim ? '<span class="interim">' + typewriterInterim + '</span>' : '');
      if (viewerAutoScroll) viewerScrollToBottom();
      typewriterTimer = setTimeout(runTypewriter, 30);
    } else {
      el.innerHTML = viewerDisplayedText +
        (typewriterInterim ? '<span class="interim">' + typewriterInterim + '</span>' : '');
      if (viewerAutoScroll) viewerScrollToBottom();
      typewriterTimer = null;
    }
  }

  const VIEWER_ID = Math.random().toString(36).slice(2, 10);

  async function fetchSync() {
    try {
      const res = await fetch(SYNC_URL + '?vid=' + VIEWER_ID);
      const data = await res.json();
      if (data.ts > lastTs) {
        lastTs = data.ts;
        startTypewriter(data.chinese || '', data.interimChinese || '');
      }
      document.getElementById('syncDot').classList.add('connected');
    } catch (e) {
      document.getElementById('syncDot').classList.remove('connected');
    }
  }

  function changeFontSizeViewer(delta) {
    viewerFontSize = Math.max(20, Math.min(80, viewerFontSize + delta));
    document.getElementById('viewerChinese').style.fontSize = viewerFontSize + 'px';
    document.getElementById('fontLabelViewer').textContent = viewerFontSize + 'px';
  }

  window.addEventListener('beforeunload', () => {
    recState = 'stopped';
    if (recognition) recognition.stop();
  });
</script>
</body>
</html>
